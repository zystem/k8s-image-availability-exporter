name: CI and release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to attach assets to, for example v0.1.0
        required: false
        type: string

permissions:
  actions: read
  contents: write
  packages: write

env:
  NIM_VERSION: "2.2.4"
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  HELM_CHART_REPOSITORY: oci://ghcr.io/${{ github.repository_owner }}/charts

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Set up Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: ${{ env.NIM_VERSION }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev curl

      - name: Install Nim dependencies
        run: nimble install -y yyjson@1.0.0 promlite@0.2.0 yaml@2.2.0

      - name: Run tests
        run: sh tests/run.sh

      - name: Build binary
        run: sh build.sh

      - name: Prepare binary artifact
        run: |
          mkdir -p dist
          cp build/k8s-image-availability-exporter dist/k8s-image-availability-exporter-linux-amd64
          chmod +x dist/k8s-image-availability-exporter-linux-amd64
          sha256sum dist/k8s-image-availability-exporter-linux-amd64 > dist/k8s-image-availability-exporter-linux-amd64.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: k8s-image-availability-exporter-linux-amd64
          path: dist/*

  helm:
    name: Helm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/k8s-image-availability-exporter

      - name: Render chart
        run: |
          helm template k8s-image-availability-exporter helm/k8s-image-availability-exporter \
            --namespace monitoring \
            --set podMonitor.enabled=true \
            --set prometheusRule.enabled=true

      - name: Package chart
        run: helm package helm/k8s-image-availability-exporter --destination build/helm

      - name: Log in to GHCR for Helm
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Publish chart to GHCR OCI
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')
        run: |
          chart="$(ls build/helm/*.tgz)"
          helm push "$chart" "$HELM_CHART_REPOSITORY"

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs:
      - test-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{version}},value=${{ github.event.inputs.release_tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,prefix=sha-

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && !(github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs:
      - test-build
      - helm
      - docker
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '')

    steps:
      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: k8s-image-availability-exporter-linux-amd64
          path: dist

      - name: Verify release assets
        run: |
          ls -l dist
          test -s dist/k8s-image-availability-exporter-linux-amd64
          test -s dist/k8s-image-availability-exporter-linux-amd64.sha256

      - name: Resolve release tag
        id: release
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
