steps:
  test:
    image: nimlang/nim:2.2.4-alpine
    commands:
      - apk add --no-cache gcc musl-dev openssl-dev git curl
      - nimble install -y yyjson@1.0.0 promlite@0.2.0 yaml@2.2.0
      - ./tests/run.sh
    when:
      - event: push
      - event: pull_request
      - event: tag

  build:
    image: nimlang/nim:2.2.4-alpine
    commands:
      - apk add --no-cache gcc musl-dev openssl-dev git curl
      - nimble install -y yyjson@1.0.0 promlite@0.2.0 yaml@2.2.0
      - ./build.sh
      - mkdir -p dist
      - cp build/k8s-image-availability-exporter dist/k8s-image-availability-exporter-linux-amd64
      - chmod +x dist/k8s-image-availability-exporter-linux-amd64
      - sha256sum dist/k8s-image-availability-exporter-linux-amd64 > dist/k8s-image-availability-exporter-linux-amd64.sha256
    depends_on:
      - test
    when:
      - event: push
      - event: pull_request
      - event: tag

  helm:
    image: alpine/helm:3.15.4
    commands:
      - helm lint helm/k8s-image-availability-exporter
      - >
        helm template k8s-image-availability-exporter helm/k8s-image-availability-exporter
        --namespace monitoring
        --set podMonitor.enabled=true
        --set prometheusRule.enabled=true
      - helm package helm/k8s-image-availability-exporter --destination build/helm
    when:
      - event: push
      - event: pull_request
      - event: tag

  publish_helm:
    image: alpine/helm:3.15.4
    commands:
      - echo "$CI_NETRC_PASSWORD" | helm registry login ghcr.io --username "$CI_NETRC_USERNAME" --password-stdin
      - helm push build/helm/*.tgz "oci://ghcr.io/$CI_REPO_OWNER/charts"
    depends_on:
      - helm
    when:
      - event: tag
        ref: refs/tags/v*

  publish_image:
    image: woodpeckerci/plugin-docker-buildx:5.2.0
    settings:
      registry: ghcr.io
      repo: ghcr.io/${CI_REPO}
      username: ${CI_NETRC_USERNAME}
      password: ${CI_NETRC_PASSWORD}
      platforms:
        - linux/amd64
        - linux/arm64
      build_args:
        - VERSION=${CI_COMMIT_TAG##v}
      tags:
        - ${CI_COMMIT_TAG##v}
        - ${CI_COMMIT_TAG}
        - latest
    depends_on:
      - build
    when:
      - event: tag
        ref: refs/tags/v*

  publish_release:
    image: ghcr.io/cli/cli:2.74.2
    commands:
      - GH_TOKEN="$CI_NETRC_PASSWORD" gh release create "$CI_COMMIT_TAG" dist/* --generate-notes --repo "$CI_REPO" --title "$CI_COMMIT_TAG" || GH_TOKEN="$CI_NETRC_PASSWORD" gh release upload "$CI_COMMIT_TAG" dist/* --clobber --repo "$CI_REPO"
    depends_on:
      - build
      - publish_helm
      - publish_image
    when:
      - event: tag
        ref: refs/tags/v*
