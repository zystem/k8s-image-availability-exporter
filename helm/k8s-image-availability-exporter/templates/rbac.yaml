{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-image-availability-exporter.fullname" . }}
  labels:
    {{- include "k8s-image-availability-exporter.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
      - serviceaccounts
    verbs:
      - get
      - list
      - watch
{{- if .Values.rbac.readSecrets }}
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
{{- end }}
  - apiGroups:
      - apps
    resources:
      - deployments
      - daemonsets
      - statefulsets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - cronjobs
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-image-availability-exporter.fullname" . }}
  labels:
    {{- include "k8s-image-availability-exporter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "k8s-image-availability-exporter.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-image-availability-exporter.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
